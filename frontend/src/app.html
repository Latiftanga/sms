<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      (function () {
        var saved = localStorage.getItem('sis-theme');
        var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
        var accent = localStorage.getItem('sis-accent');
        if (accent) document.documentElement.style.setProperty('--accent', accent);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="app-init" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:99999;transition:opacity 0.18s ease">
      <div class="app-init-spinner"></div>
    </div>
    <style>
      #app-init { background: #F2F0EC; }
      :root.dark #app-init { background: #141414; }
      .app-init-spinner {
        width: 22px; height: 22px;
        border: 2px solid rgba(0,0,0,0.1);
        border-top-color: var(--accent, #6366f1);
        border-radius: 50%;
        animation: app-init-spin 0.65s linear infinite;
      }
      :root.dark .app-init-spinner { border-color: rgba(255,255,255,0.1); border-top-color: var(--accent, #6366f1); }
      @keyframes app-init-spin { to { transform: rotate(360deg); } }
    </style>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
