name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, type-check, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ttek_sis_test
          POSTGRES_USER: ttek
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports: ["6379:6379"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check app tests

      - name: Type-check
        run: uv run mypy app --ignore-missing-imports

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://ttek:testpassword@localhost:5432/ttek_sis_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-32-chars-xxxx
          APP_ENV: test
        run: uv run alembic upgrade head

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://ttek:testpassword@localhost:5432/ttek_sis_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-32-chars-xxxx
          APP_ENV: test
        run: uv run pytest tests/ -v --tb=short

  frontend:
    name: Frontend — type-check, test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Test
        run: npm run test -- --run

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build backend/ --target runtime -t ttek-sis-api:ci

      - name: Build frontend image
        run: docker build frontend/ --target production -t ttek-sis-frontend:ci
