services:
  api:
    build:
      target: development
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: development

  worker:
    build:
      target: development
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: development

  migrate:
    volumes:
      - ./backend:/app

  test:
    build:
      target: development
    volumes:
      - ./backend:/app

  frontend:
    build:
      target: development
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
